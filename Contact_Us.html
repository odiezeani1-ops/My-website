<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="css_stuff.css">
</head>
<body>
    <header>
        <h1>Contact Me</h1>
        <h3>Get in touch with me</h3>
        <p>Feel free to reach out to me for any inquiries or feedback. I value your input and look forward to hearing from you!</p>
    </header>
   <div class="form-container">
    <section class="contact form">
       <fieldset >
       <form id="signUp">
                    <label>UserName:</label>
                    <input type="text" placeholder="What is your username?" name="username" 
                    id="username" required>
                    <label>Password:</label>
                    <input type="password" id="password" name="password" required><br>
                    <label>Gender:</label>
                    <input type="radio" id="male" checked name="gender" value="male">
                    <label for="male">Male:</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female:</label>
                    <label>Upload File</label>:<input type="file">
                    <br>
                    <button>Submit</button>
                </form>
            </fieldset>
       </fieldset>
    </section>
   </div>
</body>
</html>
